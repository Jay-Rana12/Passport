<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Global Consultancy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/auth-modern.css">
</head>

<body class="auth-page">

    <div class="auth-wrapper">
        <div class="auth-card">
            <a href="index.html" class="auth-logo">
                <i class="fas fa-plane-departure"></i>
                Border<span>Bridge</span>
            </a>

            <div class="auth-header">
                <h1>Set New Password</h1>
                <p>Verify your OTP and enter your new password</p>
            </div>

            <div id="error-msg" class="error-message"></div>
            <div id="success-msg" class="success-message"></div>

            <form id="reset-password-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" required readonly>
                    </div>
                </div>
                <div class="form-group">
                    <label for="otp">Reset OTP</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="text" id="otp" placeholder="000000" maxlength="6" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="Min. 6 characters" required minlength="6">
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="reset-btn">
                    <span>Reset Password</span>
                    <i class="fas fa-check-circle" style="margin-left: 8px;"></i>
                </button>
            </form>

            <div class="auth-footer"
                style="justify-content: center; margin-top: 32px; border-top: 1px solid var(--glass-border); padding-top: 24px;">
                <p style="color: var(--text-muted);">Back to <a href="login.html"
                        style="margin-left: 5px; font-weight: 600;">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
