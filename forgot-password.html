<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Global Consultancy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/auth-modern.css">
</head>

<body class="auth-page">

    <div class="auth-wrapper">
        <div class="auth-card">
            <a href="index.html" class="auth-logo">
                <i class="fas fa-plane-departure"></i>
                Border<span>Bridge</span>
            </a>

            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Enter your email to receive recovery OTP</p>
            </div>

            <div id="error-msg" class="error-message"></div>
            <div id="success-msg" class="success-message"></div>

            <form id="forgot-password-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="forgot-btn">
                    <span>Send Reset OTP</span>
                    <i class="fas fa-paper-plane" style="margin-left: 8px;"></i>
                </button>
            </form>

            <div class="auth-footer"
                style="justify-content: center; margin-top: 32px; border-top: 1px solid var(--glass-border); padding-top: 24px;">
                <p style="color: var(--text-muted);">Remembered your password? <a href="login.html"
                        style="margin-left: 5px; font-weight: 600;">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
