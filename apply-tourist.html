<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Visa Application - Global Consultancy</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0a192f;
            --accent: #ff8c00;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }
        body { background: #f4f7f9; padding-top: 80px; }
        .app-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        /* Modern Stepper */
        .stepper { display: flex; justify-content: space-between; margin-bottom: 50px; position: relative; }
        .stepper::before { content: ''; position: absolute; top: 25px; left: 0; width: 100%; height: 4px; background: #e2e8f0; z-index: 1; border-radius: 2px; }
        .step-progress { position: absolute; top: 25px; left: 0; height: 4px; background: var(--accent-gradient); z-index: 2; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 0; }
        
        .step { position: relative; z-index: 3; text-align: center; width: 100px; }
        .step-icon { width: 54px; height: 54px; background: white; border: 4px solid #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; transition: 0.4s; color: #94a3b8; font-size: 1.2rem; }
        .step.active .step-icon { border-color: #ff8c00; color: #ff8c00; transform: scale(1.1); box-shadow: 0 10px 20px rgba(255,140,0,0.2); }
        .step.completed .step-icon { background: #10b981; border-color: #10b981; color: white; }
        .step-label { font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .step.active .step-label { color: var(--primary); }

        /* Form Card */
        .form-card { background: white; border-radius: 32px; padding: 50px; box-shadow: 0 30px 60px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8); }
        .form-step { display: none; }
        .form-step.active { display: block; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

        .section-title { font-size: 1.8rem; font-weight: 900; color: #0a192f; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        .section-title i { color: #ff8c00; font-size: 1.5rem; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .full { grid-column: 1 / -1; }
        
        .input-box { margin-bottom: 25px; }
        .input-box label { display: block; font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 10px; text-transform: uppercase; }
        .form-input { width: 100%; padding: 14px 20px; border: 2px solid #edf2f7; border-radius: 16px; font-size: 1rem; transition: 0.3s; background: #f8fafc; }
        .form-input:focus { border-color: #ff8c00; background: white; outline: none; box-shadow: 0 0 0 5px rgba(255,140,0,0.1); }

        .btn-row { display: flex; justify-content: space-between; margin-top: 50px; padding-top: 30px; border-top: 2px solid #f7fafc; }
        .btn-back { background: #f1f5f9; color: #475569; padding: 15px 35px; border-radius: 14px; font-weight: 700; cursor: pointer; border: none; }
        .btn-next { background: var(--accent-gradient); color: white; padding: 15px 45px; border-radius: 14px; font-weight: 800; cursor: pointer; border: none; box-shadow: 0 10px 20px rgba(255,140,0,0.2); }
        
        .summary-item { background: #f8fafc; padding: 15px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .summary-item span:first-child { font-weight: 700; color: #64748b; font-size: 0.85rem; }
        .summary-item span:last-child { font-weight: 800; color: #0a192f; }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fas fa-plane-departure logo-icon"></i> Global <span>Consultancy</span></a>
        </div>
    </nav>

    <div class="app-container">
        <div class="stepper">
            <div class="step-progress" id="stepProgress"></div>
            <div class="step active" data-step="1"><div class="step-icon"><i class="fas fa-user"></i></div><div class="step-label">Applicant</div></div>
            <div class="step" data-step="2"><div class="step-icon"><i class="fas fa-passport"></i></div><div class="step-label">Passport</div></div>
            <div class="step" data-step="3"><div class="step-icon"><i class="fas fa-plane"></i></div><div class="step-label">Travel</div></div>
            <div class="step" data-step="4"><div class="step-icon"><i class="fas fa-file-invoice"></i></div><div class="step-label">Review</div></div>
        </div>

        <form id="visaForm" class="form-card">
            <!-- Step 1: Applicant -->
            <div class="form-step active">
                <h2 class="section-title"><i class="fas fa-user-circle"></i> Applicant Details</h2>
                <div class="grid-2">
                    <div class="input-box"><label>First Name</label><input type="text" name="firstName" class="form-input" required></div>
                    <div class="input-box"><label>Last Name</label><input type="text" name="lastName" class="form-input" required></div>
                    <div class="input-box"><label>Date of Birth</label><input type="date" name="dob" class="form-input" required></div>
                    <div class="input-box"><label>Nationality</label><input type="text" name="nationality" class="form-input" value="Indian" readonly></div>
                    <div class="input-box full"><label>Permanent Address</label><textarea name="address" class="form-input" rows="3" required></textarea></div>
                </div>
            </div>

            <!-- Step 2: Passport -->
            <div class="form-step">
                <h2 class="section-title"><i class="fas fa-passport"></i> Passport Information</h2>
                <div class="grid-2">
                    <div class="input-box"><label>Passport Number</label><input type="text" name="passportNo" class="form-input" placeholder="e.g. L1234567" required></div>
                    <div class="input-box"><label>Place of Issue</label><input type="text" name="placeIssue" class="form-input" required></div>
                    <div class="input-box"><label>Date of Issue</label><input type="date" name="issueDate" class="form-input" required></div>
                    <div class="input-box"><label>Date of Expiry</label><input type="date" name="expiryDate" class="form-input" required></div>
                </div>
            </div>

            <!-- Step 3: Travel -->
            <div class="form-step">
                <h2 class="section-title"><i class="fas fa-route"></i> Travel & Stay</h2>
                <div class="grid-2">
                    <div class="input-box"><label>Destination Country</label><input type="text" name="dest" class="form-input" required></div>
                    <div class="input-box"><label>Travel Date</label><input type="date" name="travelDate" class="form-input" required></div>
                    <div class="input-box"><label>Purpose of Visit</label><select name="purpose" class="form-input"><option>Tourism</option><option>Business</option><option>Family Visit</option></select></div>
                    <div class="input-box"><label>Duration (Days)</label><input type="number" name="days" class="form-input" value="15"></div>
                </div>
            </div>

            <!-- Step 4: Review -->
            <div class="form-step">
                <h2 class="section-title"><i class="fas fa-clipboard-check"></i> Review Application</h2>
                <div style="display:flex; flex-direction:column; gap:15px; margin-bottom:30px;" id="summaryList"></div>
                <div style="background:#fff8ed; padding:20px; border-radius:16px; border:1px solid #ff8c00;">
                    <label style="display:flex; gap:15px; cursor:pointer;">
                        <input type="checkbox" id="declare" required style="width:20px; height:20px; margin-top:3px;">
                        <span style="font-size:0.9rem; font-weight:600; color:#475569;">I declare that all information is correct and I agree to pay the processing fee of ₹6,500.</span>
                    </label>
                </div>
            </div>

            <div class="btn-row">
                <button type="button" class="btn-back" id="prev" style="visibility:hidden">Previous</button>
                <button type="button" class="btn-next" id="next">Next Step</button>
            </div>
        </form>
    </div>

    <script src="js/script.js"></script>
    <script src="js/payment.js"></script>
    <script>
        const token = localStorage.getItem('token');
        let currentStep = 0;
        const steps = document.querySelectorAll('.form-step');
        const indicators = document.querySelectorAll('.step');
        
        async function prefill() {
            const res = await fetch('/api/profile/me', { headers: {'Authorization': `Bearer ${token}`} });
            const { success, data } = await res.json();
            if(success && data.personalInfo) {
                const f = document.getElementById('visaForm');
                f.elements['firstName'].value = data.personalInfo.fullName?.split(' ')[0] || '';
                f.elements['lastName'].value = data.personalInfo.fullName?.split(' ').slice(1).join(' ') || '';
                f.elements['dob'].value = data.personalInfo.dateOfBirth?.split('T')[0] || '';
                f.elements['address'].value = data.contactInfo?.currentAddress?.street || '';
            }
        }

        function updateUI() {
            steps.forEach((s, i) => s.classList.toggle('active', i === currentStep));
            indicators.forEach((s, i) => {
                s.classList.toggle('active', i === currentStep);
                s.classList.toggle('completed', i < currentStep);
            });
            document.getElementById('stepProgress').style.width = (currentStep / (steps.length - 1)) * 100 + '%';
            document.getElementById('prev').style.visibility = currentStep === 0 ? 'hidden' : 'visible';
            document.getElementById('next').innerText = currentStep === steps.length - 1 ? 'Pay & Submit' : 'Next Step';
            
            if(currentStep === 3) buildSummary();
        }

        function buildSummary() {
            const f = document.getElementById('visaForm');
            const list = document.getElementById('summaryList');
            list.innerHTML = `
                <div class="summary-item"><span>NAME</span><span>${f.firstName.value} ${f.lastName.value}</span></div>
                <div class="summary-item"><span>PASSPORT</span><span>${f.passportNo.value}</span></div>
                <div class="summary-item"><span>DESTINATION</span><span>${f.dest.value}</span></div>
                <div class="summary-item"><span>FEES</span><span>₹6,500</span></div>
            `;
        }

        document.getElementById('next').onclick = () => {
            const inputs = steps[currentStep].querySelectorAll('input[required], textarea[required]');
            for(let i of inputs) if(!i.checkValidity()) { i.reportValidity(); return; }
            
            if(currentStep < steps.length - 1) {
                currentStep++;
                updateUI();
            } else {
                if(!document.getElementById('declare').checked) return alert('Accept declaration');
                PaymentGateway.init({
                    amount: 6500,
                    itemName: 'Visa Application Fee',
                    onSuccess: async () => {
                        const fd = new FormData(document.getElementById('visaForm'));
                        await fetch('/api/visa/create', {
                            method: 'POST',
                            headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'},
                            body: JSON.stringify({ status: 'Submitted', applicantDetails: Object.fromEntries(fd) })
                        });
                        window.location.href = 'profile.html?tab=apps';
                    }
                });
            }
        };

        document.getElementById('prev').onclick = () => { currentStep--; updateUI(); };
        prefill();
    </script>
</body>
</html>
